<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxManager — Panel Admin</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --green: #00e5a0; --red: #ff4d4d; --yellow: #f0a500;
    --blue: #58a6ff; --text: #e6edf3; --text2: #8b949e;
    --border: #30363d; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 28px; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: var(--green); }
  .header-status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: .85rem; color: var(--text2); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
  .status-dot.on { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Stats ── */
  .stats { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; min-width: 130px; text-align: center; }
  .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--green); }
  .stat-card .lbl { font-size: .75rem; color: var(--text2); margin-top: 2px; }

  /* ── Toolbar ── */
  .toolbar { padding: 0 24px 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: .9rem; outline: none; }
  .search-box:focus { border-color: var(--green); }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn-green { background: var(--green); color: #000; }
  .btn-red   { background: var(--red); color: #fff; }
  .btn-blue  { background: var(--blue); color: #000; }
  .btn-gray  { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-yellow{ background: var(--yellow); color: #000; }

  /* ── Grid ── */
  .boxes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 0 24px 32px; }

  /* ── Box Card ── */
  .box-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color .2s; }
  .box-card:hover { border-color: var(--green); }
  .box-card.offline { border-color: var(--red); opacity: .8; }
  .box-card.blocked { border-color: var(--red); background: #1a0d0d; }
  .box-card.paused  { border-color: var(--yellow); opacity: .7; }

  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .online-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .online-dot.online  { background: var(--green); animation: pulse 2s infinite; }
  .online-dot.offline { background: var(--red); }
  .online-dot.paused  { background: var(--yellow); }

  .card-label { font-weight: 700; font-size: 1rem; flex: 1; }
  .badge { font-size: .7rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
  .badge-blocked { background: #3d0000; color: var(--red); border: 1px solid var(--red); }
  .badge-paused  { background: #2d2000; color: var(--yellow); border: 1px solid var(--yellow); }
  .badge-online  { background: #002d1a; color: var(--green); border: 1px solid var(--green); }
  .badge-offline { background: #2d0000; color: var(--red); border: 1px solid var(--red); }

  /* ── Info rows ── */
  .info-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .info-row { display: flex; align-items: center; gap: 8px; font-size: .85rem; }
  .info-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
  .info-label { color: var(--text2); min-width: 55px; }
  .info-value { color: var(--text); font-weight: 500; }

  /* ── MAC Address highlighted ── */
  .mac-value {
    color: var(--green);
    font-weight: 700;
    font-size: .95rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    background: #002d1a;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--green);
  }

  .info-time { color: var(--text2); font-size: .78rem; }

  /* ── Comment ── */
  .comment-box { background: var(--bg3); border-radius: 6px; padding: 8px 10px; margin-bottom: 12px; font-size: .82rem; color: var(--text2); font-style: italic; display: none; }
  .comment-box.visible { display: block; }

  /* ── Actions ── */
  .card-actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .card-actions .btn { padding: 6px 12px; font-size: .78rem; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 80px 24px; color: var(--text2); }
  .empty .icon { font-size: 4rem; margin-bottom: 16px; }
  .empty p { font-size: 1rem; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; min-width: 320px; max-width: 480px; width: 90%; }
  .modal h3 { margin-bottom: 16px; color: var(--green); }
  .modal textarea, .modal input[type=text] { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-size: .9rem; resize: vertical; outline: none; }
  .modal textarea:focus, .modal input:focus { border-color: var(--green); }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border: 1px solid var(--green); border-radius: 10px; padding: 12px 20px; color: var(--text); font-size: .9rem; z-index: 2000; transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 320px; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--red); }

  /* ── SQL setup notice ── */
  .setup-notice { background: #1a1100; border: 1px solid var(--yellow); border-radius: var(--radius); padding: 16px 20px; margin: 16px 24px; font-size: .88rem; line-height: 1.6; }
  .setup-notice code { background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: .82rem; }
  .setup-notice.hidden { display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">📦</div>
  <h1>BoxManager — Panel Admin</h1>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connexion...</span>
  </div>
</div>

<!-- Setup notice (affiché si table manquante) -->
<div class="setup-notice hidden" id="setupNotice">
  ⚠️ <strong>Configuration Supabase requise.</strong>
  Exécutez ce SQL dans <a href="https://supabase.com/dashboard/project/ldzroeykznfvcpmeljpq/editor" target="_blank" style="color:var(--green)">l'éditeur SQL</a> de votre projet :
  <br><br>
  <code id="sqlCode"></code>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total boxes</div></div>
  <div class="stat-card"><div class="num" id="statOnline" style="color:var(--green)">0</div><div class="lbl">En ligne</div></div>
  <div class="stat-card"><div class="num" id="statBlocked" style="color:var(--red)">0</div><div class="lbl">Bloquées</div></div>
  <div class="stat-card"><div class="num" id="statPaused" style="color:var(--yellow)">0</div><div class="lbl">En pause</div></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <input type="text" class="search-box" id="searchInput" placeholder="🔍 Rechercher par label, modèle, MAC..." oninput="renderBoxes()">
  <button class="btn btn-green" onclick="loadBoxes()">🔄 Actualiser</button>
</div>

<!-- Boxes grid -->
<div class="boxes-grid" id="boxesGrid"></div>

<!-- Modals -->
<div class="modal-overlay" id="msgModal">
  <div class="modal">
    <h3>💬 Envoyer un message</h3>
    <textarea id="msgText" rows="3" placeholder="Message à afficher sur la box (20 secondes)..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal('msgModal')">Annuler</button>
      <button class="btn btn-green" onclick="sendMessage()">Envoyer</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="commentModal">
  <div class="modal">
    <h3>📝 Commentaire</h3>
    <textarea id="commentText" rows="3" placeholder="Nom du partenaire, numéro de série, remarque..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal('commentModal')">Annuler</button>
      <button class="btn btn-green" onclick="saveComment()">Sauvegarder</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">Confirmation</h3>
    <p id="confirmText" style="color:var(--text2);margin-bottom:16px"></p>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal('confirmModal')">Annuler</button>
      <button class="btn btn-red" id="confirmBtn">Confirmer</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// CONFIG SUPABASE
// ══════════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://ldzroeykznfvcpmeljpq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkenJvZXlrem5mdmNwbWVsanBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTQyOTcsImV4cCI6MjA4ODIzMDI5N30.G49WPMcqCHs5wTGxxCoLPeoqX2wrBA4qCNMNu9vDKBs';

// ══════════════════════════════════════════════════════════════════════
// HELPER API
// ══════════════════════════════════════════════════════════════════════
async function api(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  const res = await fetch(url, { ...options, headers });
  return res;
}

async function getBoxes() {
  const res = await api('boxes?select=*&order=created_at.asc');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function patchBox(deviceId, data) {
  const res = await api('boxes?device_id=eq.' + encodeURIComponent(deviceId), {
    method: 'PATCH',
    body: JSON.stringify(data)
  });
  return res;
}

async function deleteBox(deviceId) {
  const res = await api('boxes?device_id=eq.' + encodeURIComponent(deviceId), {
    method: 'DELETE'
  });
  return res;
}

// ══════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════
let allBoxes = [];
let refreshTimer = null;
let activeDeviceId = null; // pour les modals

// ══════════════════════════════════════════════════════════════════════
// LOAD & RENDER
// ══════════════════════════════════════════════════════════════════════
async function loadBoxes() {
  try {
    allBoxes = await getBoxes();
    renderBoxes();
    setConnected(true);
  } catch (e) {
    console.error('loadBoxes:', e);
    setConnected(false);
    showToast('Erreur connexion Supabase', true);
  }
}

function renderBoxes() {
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const grid  = document.getElementById('boxesGrid');

  let filtered = allBoxes;
  if (query) {
    filtered = allBoxes.filter(b =>
      (b.label || '').toLowerCase().includes(query) ||
      (b.model || '').toLowerCase().includes(query) ||
      (b.mac_address || '').toLowerCase().includes(query) ||
      (b.brand || '').toLowerCase().includes(query) ||
      (b.comment || '').toLowerCase().includes(query)
    );
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="icon">📭</div>
      <p>${allBoxes.length === 0 ? 'Aucune box enregistrée pour le moment.' : 'Aucune box ne correspond à la recherche.'}</p>
    </div>`;
    updateStats();
    return;
  }

  grid.innerHTML = filtered.map(box => buildCard(box)).join('');
  updateStats();
}

function isOnline(box) {
  if (!box.last_seen) return false;
  const diff = (Date.now() - new Date(box.last_seen).getTime()) / 1000;
  return diff < 12;
}

function buildCard(box) {
  const online  = isOnline(box);
  const blocked = box.blocked;
  const paused  = box.paused;

  let cardClass = 'box-card';
  if (blocked) cardClass += ' blocked';
  else if (paused) cardClass += ' paused';
  else if (!online) cardClass += ' offline';

  let dotClass = 'online-dot';
  if (paused) dotClass += ' paused';
  else if (online) dotClass += ' online';
  else dotClass += ' offline';

  let badge = '';
  if (blocked)     badge = '<span class="badge badge-blocked">🔒 BLOQUÉE</span>';
  else if (paused) badge = '<span class="badge badge-paused">⏸ PAUSE</span>';
  else if (online) badge = '<span class="badge badge-online">● EN LIGNE</span>';
  else             badge = '<span class="badge badge-offline">○ HORS LIGNE</span>';

  const mac = box.mac_address || '—';
  const macHtml = mac !== '—'
    ? `<span class="mac-value">${mac}</span>`
    : `<span class="info-value" style="color:var(--text2)">—</span>`;

  const lastSeen = box.last_seen
    ? timeAgo(new Date(box.last_seen))
    : 'jamais';

  const commentHtml = box.comment
    ? `<div class="comment-box visible">💬 ${escHtml(box.comment)}</div>`
    : `<div class="comment-box"></div>`;

  const did = escAttr(box.device_id);

  return `
<div class="box-card ${cardClass.replace('box-card ','')}">
  <div class="card-header">
    <div class="${dotClass}"></div>
    <div class="card-label">${escHtml(box.label || box.device_id)}</div>
    ${badge}
  </div>
  <div class="info-rows">
    <div class="info-row">
      <span class="info-icon">📱</span>
      <span class="info-label">Modèle</span>
      <span class="info-value">${escHtml(box.model || '—')}</span>
    </div>
    <div class="info-row">
      <span class="info-icon">🔗</span>
      <span class="info-label">MAC</span>
      ${macHtml}
    </div>
    <div class="info-row">
      <span class="info-icon">🏷️</span>
      <span class="info-label">Marque</span>
      <span class="info-value">${escHtml(box.brand || '—')}</span>
    </div>
    <div class="info-row">
      <span class="info-icon">🕐</span>
      <span class="info-label">Vu</span>
      <span class="info-time">${lastSeen}</span>
    </div>
  </div>
  ${commentHtml}
  <div class="card-actions">
    ${blocked
      ? `<button class="btn btn-green" onclick="unblockBox('${did}')">🔓 Débloquer</button>`
      : `<button class="btn btn-red"   onclick="blockBox('${did}')">🔒 Bloquer</button>`
    }
    ${paused
      ? `<button class="btn btn-green" onclick="resumeBox('${did}')">▶ Reprendre</button>`
      : `<button class="btn btn-yellow" onclick="pauseBox('${did}')">⏸ Pause</button>`
    }
    <button class="btn btn-blue"  onclick="rebootBox('${did}')">🔄 Reboot</button>
    <button class="btn btn-gray"  onclick="openMsgModal('${did}')">💬 Message</button>
    <button class="btn btn-gray"  onclick="openCommentModal('${did}', '${escAttr(box.comment||'')}')">📝 Note</button>
    <button class="btn btn-red"   onclick="confirmDelete('${did}', '${escAttr(box.label||box.device_id)}')">🗑️</button>
  </div>
</div>`;
}

function updateStats() {
  const online  = allBoxes.filter(b => isOnline(b) && !b.paused).length;
  const blocked = allBoxes.filter(b => b.blocked).length;
  const paused  = allBoxes.filter(b => b.paused).length;
  document.getElementById('statTotal').textContent   = allBoxes.length;
  document.getElementById('statOnline').textContent  = online;
  document.getElementById('statBlocked').textContent = blocked;
  document.getElementById('statPaused').textContent  = paused;
}

// ══════════════════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════════════════
async function blockBox(deviceId) {
  await patchBox(deviceId, { blocked: true });
  showToast('Box bloquée');
  loadBoxes();
}

async function unblockBox(deviceId) {
  await patchBox(deviceId, { blocked: false });
  showToast('Box débloquée');
  loadBoxes();
}

async function pauseBox(deviceId) {
  await patchBox(deviceId, { paused: true });
  showToast('Box mise en pause');
  loadBoxes();
}

async function resumeBox(deviceId) {
  await patchBox(deviceId, { paused: false });
  showToast('Box reprise');
  loadBoxes();
}

async function rebootBox(deviceId) {
  await patchBox(deviceId, { reboot: true });
  showToast('Commande reboot envoyée');
}

// ── Message modal ──
function openMsgModal(deviceId) {
  activeDeviceId = deviceId;
  document.getElementById('msgText').value = '';
  openModal('msgModal');
}

async function sendMessage() {
  const text = document.getElementById('msgText').value.trim();
  if (!text) return;
  await patchBox(activeDeviceId, { lock_message: text });
  closeModal('msgModal');
  showToast('Message envoyé');
}

// ── Comment modal ──
function openCommentModal(deviceId, currentComment) {
  activeDeviceId = deviceId;
  document.getElementById('commentText').value = currentComment || '';
  openModal('commentModal');
}

async function saveComment() {
  const text = document.getElementById('commentText').value.trim();
  await patchBox(activeDeviceId, { comment: text });
  closeModal('commentModal');
  showToast('Note sauvegardée');
  loadBoxes();
}

// ── Delete ──
function confirmDelete(deviceId, label) {
  activeDeviceId = deviceId;
  document.getElementById('confirmTitle').textContent = '🗑️ Supprimer la box';
  document.getElementById('confirmText').textContent  = `Supprimer "${label}" ? La box sera déconnectée.`;
  document.getElementById('confirmBtn').onclick = doDelete;
  openModal('confirmModal');
}

async function doDelete() {
  await deleteBox(activeDeviceId);
  closeModal('confirmModal');
  showToast('Box supprimée');
  loadBoxes();
}

// ══════════════════════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Fermer modal en cliquant en dehors
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ══════════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════════
function setConnected(val) {
  document.getElementById('statusDot').className  = 'status-dot' + (val ? ' on' : '');
  document.getElementById('statusText').textContent = val
    ? `Connecté · ${allBoxes.length} box${allBoxes.length !== 1 ? 'es' : ''}`
    : 'Non connecté';
}

let toastTimer;
function showToast(msg, error = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (error ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 5)   return 'à l\'instant';
  if (s < 60)  return `il y a ${s}s`;
  if (s < 3600) return `il y a ${Math.floor(s/60)}min`;
  if (s < 86400) return `il y a ${Math.floor(s/3600)}h`;
  return `il y a ${Math.floor(s/86400)}j`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════════════════
// AUTO-REFRESH (toutes les 3 secondes)
// ══════════════════════════════════════════════════════════════════════
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadBoxes, 3000);
}

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
async function init() {
  try {
    await loadBoxes();
    startAutoRefresh();
  } catch (e) {
    setConnected(false);
  }
}

init();
</script>
</body>
</html>
